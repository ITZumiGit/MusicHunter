<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a14" />
  <meta name="description" content="MusicHunter — поиск музыки без границ" />
  <title>MusicHunter</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎧</text></svg>" />
  <!-- PWA manifest -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <script src="https://telegram.org/js/telegram-web-app.js?v=20260622c"></script>
  <style>
    #app-loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a14;display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .3s}
    #app-loading .spinner{width:40px;height:40px;border:3px solid rgba(108,92,231,.2);border-top-color:#6c5ce7;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="app-loading"><div class="spinner"></div></div>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
  <script>
    document.addEventListener('DOMContentLoaded',function(){var s=setInterval(function(){if(document.querySelector('#app > *')){var l=document.getElementById('app-loading');if(l){l.style.opacity='0';setTimeout(function(){l.remove()},300)}clearInterval(s)}},100)});
  </script>
</body>
</html>
